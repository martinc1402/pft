          - generic [ref=e32]: health & performance
        - generic [ref=e33]:
          - paragraph [ref=e35]: Performance Fitness Training and Rehabilitation was founded with the vision of raising industry standards and providing people with access to a high-quality, personalised approach to health and fitness. Established in 2015 by Jake Sbroja, an emerging coach driven by a strong passion for health, performance, and helping others, PFT was created to make a meaningful difference in people's lives through exercise.
          - paragraph [ref=e37]: Jake Sbroja is a National-level Olympic weightlifter with tertiary qualifications in Exercise Physiology and Rehabilitation. Known for his attention to detail and commitment to achieving the best outcomes for clients, Jake uses evidence-based exercise strategies to support individuals across a wide range of needs and goals.
          - paragraph [ref=e39]: Through Performance Fitness Training and Rehabilitation, Jake works with athletes of all levels, individuals living with disabilities, chronic health conditions, musculoskeletal injuries, as well as those simply seeking a premium, individualised service. PFT also collaborates closely with doctors, dietitians, and other allied health professionals to ensure clients receive the highest standard of care and support.
          - paragraph [ref=e41]: Built on the belief that exercise exists on a continuum — and that everyone has the ability to improve their health, function, and performance through movement — PFT was created to empower people to move better, feel stronger, and live healthier lives.
